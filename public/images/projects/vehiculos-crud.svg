<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="0"/>
  
  <!-- Terminal window -->
  <rect x="80" y="40" width="640" height="320" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  
  <!-- Title bar -->
  <rect x="80" y="40" width="640" height="36" rx="12" fill="#161b22"/>
  <rect x="80" y="64" width="640" height="12" fill="#161b22"/>
  <circle cx="104" cy="58" r="6" fill="#ff5f57"/>
  <circle cx="124" cy="58" r="6" fill="#febc2e"/>
  <circle cx="144" cy="58" r="6" fill="#28c840"/>
  <text x="400" y="62" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Swagger UI — Vehiculos API</text>
  
  <!-- API Endpoints -->
  <rect x="110" y="100" width="580" height="36" rx="6" fill="#1a2332"/>
  <rect x="120" y="108" width="50" height="20" rx="4" fill="#49cc90"/>
  <text x="145" y="122" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">GET</text>
  <text x="185" y="122" font-family="monospace" font-size="13" fill="#c9d1d9">/api/vehiculos</text>
  <text x="580" y="122" font-family="monospace" font-size="11" fill="#8b949e">Listar todos</text>
  
  <rect x="110" y="146" width="580" height="36" rx="6" fill="#1a2332"/>
  <rect x="120" y="154" width="50" height="20" rx="4" fill="#49cc90"/>
  <text x="145" y="168" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">GET</text>
  <text x="185" y="168" font-family="monospace" font-size="13" fill="#c9d1d9">/api/vehiculos/{id}</text>
  <text x="580" y="168" font-family="monospace" font-size="11" fill="#8b949e">Buscar por ID</text>
  
  <rect x="110" y="192" width="580" height="36" rx="6" fill="#1a2332"/>
  <rect x="120" y="200" width="50" height="20" rx="4" fill="#61affe"/>
  <text x="145" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">POST</text>
  <text x="185" y="214" font-family="monospace" font-size="13" fill="#c9d1d9">/api/vehiculos</text>
  <text x="580" y="214" font-family="monospace" font-size="11" fill="#8b949e">Crear nuevo</text>
  
  <rect x="110" y="238" width="580" height="36" rx="6" fill="#1a2332"/>
  <rect x="120" y="246" width="50" height="20" rx="4" fill="#fca130"/>
  <text x="145" y="260" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">PUT</text>
  <text x="185" y="260" font-family="monospace" font-size="13" fill="#c9d1d9">/api/vehiculos/{id}</text>
  <text x="580" y="260" font-family="monospace" font-size="11" fill="#8b949e">Actualizar</text>
  
  <rect x="110" y="284" width="580" height="36" rx="6" fill="#1a2332"/>
  <rect x="120" y="292" width="65" height="20" rx="4" fill="#f93e3e"/>
  <text x="152" y="306" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">DELETE</text>
  <text x="200" y="306" font-family="monospace" font-size="13" fill="#c9d1d9">/api/vehiculos/{id}</text>
  <text x="580" y="306" font-family="monospace" font-size="11" fill="#8b949e">Eliminar</text>
  
  <!-- Tech badges -->
  <rect x="120" y="335" width="45" height="18" rx="4" fill="#e84a00" opacity="0.2"/>
  <text x="142" y="348" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e84a00">Java</text>
  <rect x="175" y="335" width="80" height="18" rx="4" fill="#6db33f" opacity="0.2"/>
  <text x="215" y="348" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6db33f">Spring Boot</text>
  <rect x="265" y="335" width="65" height="18" rx="4" fill="#47a248" opacity="0.2"/>
  <text x="297" y="348" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#47a248">MongoDB</text>
</svg>
